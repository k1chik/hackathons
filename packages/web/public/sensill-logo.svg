<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- CAT yellow background -->
  <rect width="512" height="512" rx="115" fill="#FFCD00"/>

  <!-- === ANTENNAE (drawn first, behind head) === -->
  <!-- Left antenna: curves up-left from head -->
  <path d="M224 162 Q158 108 110 44"
        stroke="#080808" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Right antenna: curves up-right from head -->
  <path d="M286 162 Q352 108 402 44"
        stroke="#080808" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Left sensory bulb (sensillum) -->
  <circle cx="110" cy="44" r="38" fill="#080808"/>
  <!-- Right sensory bulb -->
  <circle cx="402" cy="44" r="38" fill="#080808"/>

  <!-- === BODY SEGMENTS (drawn tail to head so head overlaps) === -->
  <!-- Tail segment -->
  <circle cx="164" cy="438" r="55" fill="#080808"/>
  <!-- Middle segment -->
  <circle cx="168" cy="355" r="60" fill="#080808"/>
  <!-- Forward segment -->
  <circle cx="204" cy="274" r="64" fill="#080808"/>

  <!-- === HEAD === -->
  <circle cx="258" cy="200" r="74" fill="#080808"/>

  <!-- Eyes (yellow on dark head) -->
  <circle cx="230" cy="180" r="20" fill="#FFCD00"/>
  <circle cx="278" cy="180" r="20" fill="#FFCD00"/>
  <!-- Pupils -->
  <circle cx="235" cy="178" r="9" fill="#080808"/>
  <circle cx="283" cy="178" r="9" fill="#080808"/>
</svg>
